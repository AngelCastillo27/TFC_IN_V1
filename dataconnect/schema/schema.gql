type User @table {
  email: String!
  password: String!
  role: String!
  createdAt: Timestamp!
  firstName: String
  lastName: String
  phoneNumber: String
}

type MenuItem @table {
  name: String!
  description: String!
  price: Float!
  category: String!
  createdAt: Timestamp!
  imageUrl: String
  allergens: [String]
}

type Table @table {
  tableNumber: Int!
  capacity: Int!
  createdAt: Timestamp!
  location: String
}

type Reservation @table {
  user: User!
  table: Table
  reservationDate: Date!
  reservationTime: String!
  numberOfGuests: Int!
  status: String!
  createdAt: Timestamp!
  specialRequests: String
  dietaryPreferences: [String]
}

type RestaurantInfo @table {
  name: String!
  address: String!
  phoneNumber: String!
  openingHours: String!
  createdAt: Timestamp!
  description: String
  imageUrls: [String]
}